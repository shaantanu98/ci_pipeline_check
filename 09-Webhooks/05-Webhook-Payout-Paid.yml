info:
  name: 05 Webhook Payout Paid
  type: http
  seq: 5

http:
  method: POST
  url: "{{BASE_URL}}/webhook"
  headers:
    - name: Content-Type
      value: application/json
    - name: Justifi-Signature
      value: test_sig
    - name: Justifi-Timestamp
      value: 1234567890
  body:
    type: json
    data: |-
      {
      "id": "evt_test_payout_paid",
      "account_id": "{{ACCOUNT_ID}}",
      "event_name": "payout.paid",
      "data": {
        "id": "po_test_e2e_001",
        "amount": 50000,
        "status": "paid"
      }
      }
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        console.log("Webhook payout.paid status:", res.getStatus());
        console.log("Response:", JSON.stringify(res.getBody()));
    - type: tests
      code: |-
        test("should return 200 or 400", function() {
          expect(res.getStatus()).to.be.oneOf([200, 400]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Send payout.paid webhook event.
  Returns 400 if signature validation fails (expected with fake sig).
  Returns 200 if account found and signature valid.
