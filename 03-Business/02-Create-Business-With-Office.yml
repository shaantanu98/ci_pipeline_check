info:
  name: 02 Create Business With Office
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/business"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
      "business_name": "WILL_BE_SET_BY_SCRIPT",
      "office_id": "{{OFFICE_ID}}"
      }
  auth:
    type: none

runtime:
  scripts:
    - type: before-request
      code: |-
        const name = "E2E_Office_" + Math.random().toString(36).substring(2, 10) + "_" + Date.now();
        const officeId = bru.getEnvVar("OFFICE_ID") || bru.getEnvVar("V2_OFFICE_ID");
        req.setBody({ business_name: name, office_id: officeId });
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.be.oneOf([200, 412]);
        });
        test("should have uuid", function() {
          if (res.getStatus() === 200) expect(res.getBody().data.uuid).to.be.a('string');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create business linked to specific office.
  Tests optional office_id parameter.
