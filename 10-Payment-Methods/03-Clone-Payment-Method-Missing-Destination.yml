info:
  name: 03 Clone Payment Method Missing Destination
  type: http
  seq: 3

http:
  method: POST
  url: "{{BASE_URL}}/clone_payment_method"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
      "payment_methods": [
        {
          "token": "pm_test",
          "id": "pm_test_id"
        }
      ],
      "request_id": "e2e-clone-no-dest"
      }
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return error for missing destination", function() {
          expect(res.getStatus()).to.be.oneOf([400, 403, 412]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Validation: destination_account_id is required.
  Should return 400 when missing.
