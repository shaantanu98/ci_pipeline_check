info:
  name: 05 Clone Payment Method Missing Request ID
  type: http
  seq: 5

http:
  method: POST
  url: "{{BASE_URL}}/clone_payment_method"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
      "destination_account_id": "{{ACCOUNT_ID}}",
      "payment_methods": [
        {
          "token": "pm_test",
          "id": "pm_test_id"
        }
      ]
      }
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return error for missing request_id", function() {
          expect(res.getStatus()).to.be.oneOf([400, 403, 412]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Validation: request_id is required.
  Should return 400 when missing.
