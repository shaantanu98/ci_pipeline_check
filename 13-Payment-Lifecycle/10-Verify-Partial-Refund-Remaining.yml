info:
  name: 10 Verify Partial Refund Remaining
  type: http
  seq: 10

http:
  method: GET
  url: "{{BASE_URL}}/payment/id/{{PARTIAL_REFUND_PAYMENT_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (res.getStatus() === 200 && body.data) {
          console.log("=== PARTIAL REFUND VERIFICATION ===");
          console.log("Original Amount:", body.data.amount);
          console.log("Amount Refunded:", body.data.amount_refunded);
          console.log("Amount Refundable:", body.data.amount_refundable);
          console.log("Expected Refundable: 12500 (20000 - 7500)");
          const match = body.data.amount_refundable === 12500;
          console.log("Match:", match ? "YES" : "NO - check manually");
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have correct refund tracking", function() {
          const d = res.getBody().data;
          if (d.amount_refunded !== null) {
            console.log("Refund tracking: refunded=" + d.amount_refunded + " refundable=" + d.amount_refundable);
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Verify the partially refunded payment:
  - amount_refunded should be 7500
  - amount_refundable should be 12500 (20000 - 7500)
