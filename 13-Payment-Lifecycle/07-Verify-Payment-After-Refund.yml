info:
  name: 07 Verify Payment After Refund
  type: http
  seq: 7

http:
  method: GET
  url: "{{BASE_URL}}/payment/id/{{REFUND_PAYMENT_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (res.getStatus() === 200 && body.data) {
          console.log("=== PAYMENT AFTER REFUND ===");
          console.log("Status:", body.data.status);
          console.log("Amount:", body.data.amount);
          console.log("Amount Refunded:", body.data.amount_refunded);
          console.log("Amount Refundable:", body.data.amount_refundable);
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("payment should reflect refund", function() {
          const d = res.getBody().data;
          if (d.amount_refunded !== null && d.amount_refunded !== undefined) {
            console.log("Refund reflected: amount_refunded =", d.amount_refunded);
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Fetch the refunded payment and verify:
  - amount_refunded equals original amount
  - amount_refundable is 0
  - status reflects the refund
