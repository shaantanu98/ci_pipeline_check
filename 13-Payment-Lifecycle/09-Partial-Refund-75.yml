info:
  name: 09 Partial Refund $75
  type: http
  seq: 9

http:
  method: POST
  url: "{{BASE_URL}}/refund/:uuid"
  params:
    - name: uuid
      value: "{{SUB_UUID}}"
      type: path
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "type": "partial",
        "amount": 7500,
        "justifi_payment_id": "{{PARTIAL_REFUND_PAYMENT_ID}}",
        "reason": "E2E partial refund $75 of $200"
      }
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (res.getStatus() === 200 && body.data) {
          console.log("=== PARTIAL REFUND ===");
          console.log("Refund ID:", body.data.refund_id);
          console.log("Refund Amount:", body.data.amount, "cents ($75)");
          console.log("Status:", body.data.status);
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.be.oneOf([200, 400]);
        });
        test("partial refund amount should be 7500 (if 200)", function() {
          if (res.getStatus() === 200) {
            expect(res.getBody().data.amount).to.equal(7500);
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Refund $75 from the $200 payment.
  Verifies partial refund amount and remaining refundable balance.
