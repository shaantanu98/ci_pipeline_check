info:
  name: 12 Void Payment
  type: http
  seq: 12

http:
  method: POST
  url: "{{BASE_URL}}/void_payment/{{SUB_UUID}}/{{VOID_PAYMENT_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (res.getStatus() === 200 && body.data) {
          console.log("=== PAYMENT VOIDED ===");
          console.log("Payment ID:", body.data.payment_id);
          console.log("Status:", body.data.status);
          console.log("Amount:", body.data.amount);
        }
    - type: tests
      code: |-
        test("should return 200 or 400 (if payment already captured)", function() {
          // Void may fail on staging if payment settles before void reaches processor
          expect(res.getStatus()).to.be.oneOf([200, 400]);
        });
        test("should have response data", function() {
          const body = res.getBody();
          expect(body).to.be.an('object');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Void the $30 payment from step 11.
  Verifies the payment status changes to voided.
