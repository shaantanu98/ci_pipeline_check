info:
  name: 13 Verify Void Status
  type: http
  seq: 13

http:
  method: GET
  url: "{{BASE_URL}}/payment/id/{{VOID_PAYMENT_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (res.getStatus() === 200 && body.data) {
          console.log("=== VOID VERIFICATION ===");
          console.log("Status:", body.data.status);
          console.log("Amount Refundable:", body.data.amount_refundable);
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("status should reflect void", function() {
          const status = res.getBody().data.status;
          console.log("Payment status after void:", status);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Verify the voided payment has correct status.
