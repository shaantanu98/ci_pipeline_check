info:
  name: 06 Full Refund
  type: http
  seq: 6

http:
  method: POST
  url: "{{BASE_URL}}/refund/:uuid"
  params:
    - name: uuid
      value: "{{SUB_UUID}}"
      type: path
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "type": "full",
        "justifi_payment_id": "{{REFUND_PAYMENT_ID}}",
        "reason": "E2E lifecycle full refund test"
      }
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        const status = res.getStatus();
        if (status === 200 && body.data) {
          bru.setEnvVar("REFUND_ID", body.data.refund_id || "");
          const origAmount = parseInt(bru.getEnvVar("REFUND_PAYMENT_AMOUNT") || "0");
          console.log("=== FULL REFUND ===");
          console.log("Refund ID:", body.data.refund_id);
          console.log("Refund Amount:", body.data.amount, "cents");
          console.log("Original Payment:", origAmount, "cents");
          console.log("Status:", body.data.status);
          console.log("Match:", body.data.amount === origAmount ? "YES" : "NO - MISMATCH!");
        } else {
          console.log("Refund failed:", status, JSON.stringify(body));
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.be.oneOf([200, 400]);
        });
        test("refund amount should match original payment (if 200)", function() {
          if (res.getStatus() === 200) {
            const origAmount = parseInt(bru.getEnvVar("REFUND_PAYMENT_AMOUNT") || "0");
            expect(res.getBody().data.amount).to.equal(origAmount);
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Refund the full $50 payment from step 05.
  Verifies the refund amount matches original payment.
