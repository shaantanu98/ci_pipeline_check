info:
  name: 03 Verify Payment Exists
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/payment/id/{{PAYMENT_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (res.getStatus() === 200 && body.data) {
          console.log("=== PAYMENT VERIFIED ===");
          console.log("Payment ID:", body.data.payment_id);
          console.log("Status:", body.data.status);
          console.log("Amount:", body.data.amount);
          console.log("Fee:", body.data.fee_amount);
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("payment_id should match", function() {
          const expected = bru.getEnvVar("PAYMENT_ID");
          expect(res.getBody().data.payment_id).to.equal(expected);
        });
        test("amount should be 10000", function() {
          expect(res.getBody().data.amount).to.equal(10000);
        });
        test("status should be succeeded", function() {
          expect(res.getBody().data.status).to.be.oneOf(['succeeded', 'pending', 'authorized']);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Fetch the payment created in step 02 and verify all fields.
  Confirms the payment was persisted correctly.
