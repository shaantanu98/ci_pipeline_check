info:
  name: 03 Get Web Component Token No Body
  type: http
  seq: 3

http:
  method: POST
  url: "{{BASE_URL}}/web_component_token"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {}
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return error for missing resources", function() {
          expect(res.getStatus()).to.be.oneOf([400, 412, 500]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Validation: request body with resources is required.
  Should return 400 for missing body.
