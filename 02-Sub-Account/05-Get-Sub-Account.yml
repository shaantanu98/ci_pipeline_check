info:
  name: 05 Get Sub Account
  type: http
  seq: 5

http:
  method: GET
  url: "{{BASE_URL}}/sub_account/{{SUB_UUID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have data object", function() {
          expect(res.getBody().data).to.be.an('object');
        });
        test("should have uuid matching request", function() {
          const uuid = bru.getEnvVar("SUB_UUID");
          expect(res.getBody().data.uuid).to.equal(uuid);
        });
        test("should have status", function() {
          expect(res.getBody().data.status).to.be.a('string');
        });
        test("should have account_id", function() {
          expect(res.getBody().data.account_id).to.be.a('string');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get sub-account by UUID.
  Returns sub-account details including status, account_id, company rates.
