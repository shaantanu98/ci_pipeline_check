info:
  name: 06 Get Sub Account With Office Filter
  type: http
  seq: 6

http:
  method: GET
  url: "{{BASE_URL}}/sub_account/{{SUB_UUID}}?office_id={{OFFICE_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have data", function() {
          expect(res.getBody().data).to.be.an('object');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get sub-account filtered by office_id query parameter.
  Tests the office-level filtering capability.
