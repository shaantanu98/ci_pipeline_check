info:
  name: 12 Get Sub Account No Auth
  type: http
  seq: 12

http:
  method: GET
  url: "{{BASE_URL}}/sub_account/{{SUB_UUID}}"
  headers:
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 401 or 403 for missing Authorization", function() {
          // Lambda Authorizer denies when Authorization header is absent
          expect(res.getStatus()).to.be.oneOf([401, 403]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Test missing authorization.
  Should return 401/403 when Authorization header is missing.
