info:
  name: 03 Create Sub Account Missing Name
  type: http
  seq: 3

http:
  method: POST
  url: "{{BASE_URL}}/sub_account"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
      "office_id": "test_office"
      }
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 400 for missing name", function() {
          expect(res.getStatus()).to.be.oneOf([400, 403, 412]);
        });
        test("should have error message", function() {
          const body = res.getBody();
          expect(body.error || body.message || body.fieldErrors).to.exist;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Validation test: account_name is required.
  Should return 400 error when name is missing.
