info:
  name: 13 Get Sub Account By Company ID
  type: http
  seq: 13

http:
  method: GET
  url: "{{BASE_URL}}/sub_account/{{COMPANY_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        console.log("=== GET SUB-ACCOUNT BY COMPANY_ID ===");
        console.log("Status:", res.getStatus());
        if (res.getStatus() === 200 && body.data) {
          console.log("uuid:", body.data.uuid);
          console.log("company_id:", body.data.company_id);
          console.log("account_id:", body.data.account_id);
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have sub-account data", function() {
          const d = res.getBody().data;
          expect(d).to.be.an('object');
          expect(d.uuid).to.be.a('string');
          expect(d.account_id).to.be.a('string');
        });
        test("should have company_id matching request", function() {
          const d = res.getBody().data;
          expect(d.company_id).to.be.a('string');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  GET sub-account using company_id instead of UUID.
  The handler queries WHERE uuid = ? OR company_id = ?.
