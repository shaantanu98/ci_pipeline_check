info:
  name: 15 Get Sub Account Full Response
  type: http
  seq: 15

http:
  method: GET
  url: "{{BASE_URL}}/sub_account/{{SUB_UUID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (res.getStatus() === 200 && body.data) {
          console.log("=== FULL RESPONSE FIELDS ===");
          console.log("Fields:", Object.keys(body.data).join(", "));
          if (body.data.leappayCompanyRate) {
            console.log("Rate keys:", Object.keys(body.data.leappayCompanyRate).join(", "));
          }
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have uuid", function() {
          expect(res.getBody().data.uuid).to.be.a('string');
        });
        test("should have account_id", function() {
          expect(res.getBody().data.account_id).to.be.a('string');
        });
        test("should have account_name", function() {
          expect(res.getBody().data.account_name).to.be.a('string');
        });
        test("should have status", function() {
          expect(res.getBody().data.status).to.be.oneOf(['enabled', 'created', 'disabled', 'archived', 'submitted']);
        });
        test("should have company_id", function() {
          expect(res.getBody().data.company_id).to.be.a('string');
        });
        test("should have created_at", function() {
          expect(res.getBody().data.created_at).to.be.a('string');
        });
        test("should have leappayCompanyRate embedded", function() {
          const rate = res.getBody().data.leappayCompanyRate;
          expect(rate).to.be.an('object');
          expect(rate.CARD_RATE).to.be.a('number');
          expect(rate.ACH_RATE).to.be.a('number');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Verify all response fields from GET sub-account.
  Asserts transformer output: uuid, account_id, account_name,
  status, company_id, created_at, and embedded leappayCompanyRate.
