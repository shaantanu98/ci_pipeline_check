info:
  name: 07 Get Rate V2 Structure
  type: http
  seq: 7

http:
  method: GET
  url: "{{BASE_URL}}/leappay_company_rate/{{COMPANY_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: x-card-repricing
      value: "true"
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const rate = res.getBody().leappayCompanyRate || {};
        const isV2 = !!rate.CREDIT_CARD;
        console.log("=== RATE WITH REPRICING ===");
        console.log("Is V2:", isV2);
        console.log("Keys:", Object.keys(rate).join(", "));
        if (isV2) {
          console.log("CREDIT_CARD:", JSON.stringify(rate.CREDIT_CARD));
          console.log("DEBIT_CARD:", JSON.stringify(rate.DEBIT_CARD));
          console.log("ACH:", JSON.stringify(rate.ACH));
        } else {
          console.log("V1 flat: CARD_RATE=", rate.CARD_RATE, "ACH_RATE=", rate.ACH_RATE);
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have leappayCompanyRate object", function() {
          expect(res.getBody().leappayCompanyRate).to.be.an('object');
        });
        test("should have V2 structure or V1 fallback (grandfathered)", function() {
          const rate = res.getBody().leappayCompanyRate;
          // V2 has CREDIT_CARD/DEBIT_CARD/ACH sub-objects
          // V1 (grandfathered) has flat CARD_RATE/ACH_RATE
          const isV2 = !!rate.CREDIT_CARD;
          const isV1 = !!rate.CARD_RATE;
          expect(isV2 || isV1).to.equal(true);
        });
        test("should have valid rate numbers", function() {
          const rate = res.getBody().leappayCompanyRate;
          if (rate.CREDIT_CARD) {
            expect(rate.CREDIT_CARD.RATE).to.be.a('number');
            expect(rate.DEBIT_CARD.RATE).to.be.a('number');
          } else {
            expect(rate.CARD_RATE).to.be.a('number');
            expect(rate.ACH_RATE).to.be.a('number');
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get V2 rate structure WITH x-card-repricing header.
  Validates tiered pricing: CREDIT_CARD, DEBIT_CARD, ACH objects each with RATE.
