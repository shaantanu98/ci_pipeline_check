info:
  name: 08 Get Rate Missing Company ID
  type: http
  seq: 8

http:
  method: GET
  url: "{{BASE_URL}}/leappay_company_rate/nonexistent_company_xyz"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200 with default rates", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have leappayCompanyRate with defaults", function() {
          const body = res.getBody();
          expect(body.leappayCompanyRate).to.be.an('object');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get rate for a nonexistent company ID.
  API returns 200 with default/platform rates for unknown companies.
