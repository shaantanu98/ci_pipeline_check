info:
  name: 05 Get Company Rate No Repricing Header
  type: http
  seq: 5

http:
  method: GET
  url: "{{BASE_URL}}/leappay_company_rate/{{COMPANY_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (res.getStatus() === 200) {
        console.log("V1 Rate (no repricing header):", JSON.stringify(body, null, 2));
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get company rate WITHOUT x-card-repricing header.
  Should return V1 rate structure (backward compatible).
