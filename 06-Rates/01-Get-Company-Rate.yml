info:
  name: 01 Get Company Rate
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/leappay_company_rate/{{COMPANY_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (res.getStatus() === 200) {
        console.log("Company rate:", JSON.stringify(body, null, 2));
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have leappayCompanyRate object", function() {
          const body = res.getBody();
          expect(body.leappayCompanyRate).to.be.an('object');
        });
        test("should have CARD_RATE", function() {
          const rate = res.getBody().leappayCompanyRate;
          expect(rate.CARD_RATE).to.be.a('number');
        });
        test("should have ACH_RATE", function() {
          const rate = res.getBody().leappayCompanyRate;
          expect(rate.ACH_RATE).to.be.a('number');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get rate configuration for a company.
  Returns company-specific rate or platform defaults.
