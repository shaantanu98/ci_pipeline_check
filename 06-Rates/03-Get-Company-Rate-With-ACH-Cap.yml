info:
  name: 03 Get Company Rate With ACH Cap
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/leappay_company_rate/{{COMPANY_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: x-card-repricing
      value: "true"
    - name: x-leappay-ach-cap
      value: "true"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get company rate with x-leappay-ach-cap header enabled.
  Should include ACH_MAX_FEE in rate structure.
