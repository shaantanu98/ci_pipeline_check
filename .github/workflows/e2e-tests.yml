name: E2E API Tests

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  e2e-tests:
    name: Run E2E API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Write staging environment file from secret
        env:
          STAGING_ENV: ${{ secrets.STAGING_ENV_YML }}
        run: echo "$STAGING_ENV" > environments/staging.yml

      - name: Verify staging API connectivity
        run: |
          echo "Checking Parse Server..."
          curl -sf --max-time 10 -o /dev/null "https://api.stage.leaptodigital.com" || { echo "::error::Parse Server (api.stage.leaptodigital.com) is unreachable from GitHub Actions. Whitelist GitHub runner IPs or use a self-hosted runner."; exit 1; }
          echo "Checking LeapPay API..."
          curl -sf --max-time 10 -o /dev/null "https://leappay-api-staging.jobprog.net" || { echo "::error::LeapPay API (leappay-api-staging.jobprog.net) is unreachable."; exit 1; }
          echo "All endpoints reachable."

      - name: Run Auth tests first (bail on failure)
        run: npx bru run 01-Auth --env staging --sandbox developer --bail

      - name: Run all E2E tests
        run: npx bru run --env staging --sandbox developer --bail --output results.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: results.json
          retention-days: 30
