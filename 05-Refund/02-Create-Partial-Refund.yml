info:
  name: 02 Create Partial Refund
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/refund/:uuid"
  params:
    - name: uuid
      value: "{{SUB_UUID}}"
      type: path
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
      "type": "partial",
      "amount": 2500,
      "justifi_payment_id": "{{PAYMENT_ID}}",
      "reason": "E2E test partial refund"
      }
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.be.oneOf([200, 400, 412]);
        });
        test("should have data", function() {
          if (res.getStatus() === 200) expect(res.getBody().data).to.be.an('object');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create a partial refund for $25.00 (2500 cents).
  type: "partial" - requires amount field.
