info:
  name: 03 Link Sub Account With Transfer
  type: http
  seq: 3

http:
  method: POST
  url: "{{BASE_URL}}/link_sub_account_office"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
      "to_office_id": "new_office_id",
      "account_id": "{{ACCOUNT_ID}}",
      "from_office_id": "{{OFFICE_ID}}"
      }
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200 or validation error", function() {
          expect(res.getStatus()).to.be.oneOf([200, 400, 404, 412]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Link sub-account to new office with from_office_id (transfer).
  Tests the office transfer functionality.
