info:
  name: 09 Get Payment
  type: http
  seq: 9

http:
  method: GET
  url: "{{BASE_URL}}/payment/id/{{PAYMENT_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have data", function() {
          expect(res.getBody().data).to.be.an('object');
        });
        test("should have payment_id", function() {
          expect(res.getBody().data.payment_id).to.be.a('string');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get payment details by payment_id.
  Uses PAYMENT_ID saved from create payment test.
