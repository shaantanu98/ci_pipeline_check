info:
  name: 21 Payment With Expedited
  type: http
  seq: 21

http:
  method: POST
  url: "{{BASE_URL}}/payment/:uuid"
  params:
    - name: uuid
      value: "{{SUB_UUID}}"
      type: path
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "amount": 5000,
        "payment_token": "WILL_BE_SET_BY_SCRIPT",
        "expedited": true,
        "meta": {
          "email": "e2e-expedited@leappay.com",
          "job_id": 21
        }
      }
  auth:
    type: none

runtime:
  scripts:
    - type: before-request
      code: |-
        const axios = require("axios");
        const JUSTIFI_TOKEN = "Bearer " + bru.getEnvVar("JUSTIFI_TOKEN");
        const ACCT = bru.getEnvVar("ACCOUNT_ID");
        if (!JUSTIFI_TOKEN || JUSTIFI_TOKEN === "Bearer ") {
          console.log("ERROR: Run 'Get JustiFi Token' first");
          return;
        }
        try {
          const resp = await axios({
            method: "POST",
            url: "https://api.justifi.ai/v1/payment_methods",
            headers: {
              "Content-Type": "application/json",
              "Authorization": JUSTIFI_TOKEN,
              "Idempotency-Key": "e2e-expedited-" + Date.now(),
              "Sub-Account": ACCT
            },
            data: {
              payment_method: {
                card: {
                  name: "E2E Expedited Test",
                  number: "4242424242424242",
                  verification: "123",
                  month: "12",
                  year: "2028",
                  address_postal_code: "55555"
                }
              }
            }
          });
          const token = resp.data?.data?.card?.token;
          console.log("Card tokenized:", token);
          req.setBody({
            amount: 5000,
            payment_token: token,
            expedited: true,
            meta: { email: "e2e-expedited@leappay.com", job_id: 21 }
          });
        } catch (e) {
          console.log("Tokenization error:", e.response?.data || e.message);
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have payment_id", function() {
          expect(res.getBody().data.payment_id).to.be.a('string');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create a payment with expedited flag set to true.
  Amount: $50.00 (5000 cents) with expedited: true.
  Verifies the payment succeeds with a payment_id.
