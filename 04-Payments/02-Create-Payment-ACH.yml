info:
  name: 02 Create Payment ACH
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/payment/:uuid"
  params:
    - name: uuid
      value: "{{SUB_UUID}}"
      type: path
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
      "amount": 10000,
      "payment_token": "WILL_BE_SET_BY_SCRIPT",
      "meta": {
        "email": "e2e-ach@leappay.com",
        "job_id": 2
      }
      }
  auth:
    type: none

runtime:
  scripts:
    - type: before-request
      code: |-
        const axios = require("axios");
        const JUSTIFI_TOKEN = "Bearer " + bru.getEnvVar("JUSTIFI_TOKEN");
        const ACCT = bru.getEnvVar("ACCOUNT_ID");
        if (!JUSTIFI_TOKEN || JUSTIFI_TOKEN === "Bearer ") {
        console.log("ERROR: Run 'Get JustiFi Token' first");
        return;
        }
        try {
        const resp = await axios({
          method: "POST",
          url: "https://api.justifi.ai/v1/payment_methods",
          headers: {
            "Content-Type": "application/json",
            "Authorization": JUSTIFI_TOKEN,
            "Idempotency-Key": "e2e-ach-" + Date.now(),
            "Sub-Account": ACCT
          },
          data: {
            payment_method: {
              bank_account: {
                account_owner_name: "E2E Test",
                routing_number: "110000000",
                account_number: "000123456789",
                account_type: "checking",
                account_owner_type: "individual",
                country: "US",
                currency: "usd"
              }
            }
          }
        });
        const token = resp.data?.data?.bank_account?.token;
        console.log("ACH tokenized:", token);
        req.setBody({
          amount: 10000,
          payment_token: token,
          meta: { email: "e2e-ach@leappay.com", job_id: 2 }
        });
        } catch (e) {
        console.log("Tokenization error:", e.response?.data || e.message);
        }
    - type: after-response
      code: |-
        const body = res.getBody();
        if (res.getStatus() === 200 && body.data) {
        console.log("ACH Payment:", body.data.payment_id);
        console.log("Fee:", body.data.fee_amount, "cents");
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have payment_id", function() {
          expect(res.getBody().data.payment_id).to.be.a('string');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create an ACH (bank account) payment.
  Before-request script tokenizes a bank account via JustiFi.
  Amount: $100.00 (10000 cents)
