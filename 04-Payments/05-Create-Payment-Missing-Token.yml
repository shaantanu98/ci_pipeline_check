info:
  name: 05 Create Payment Missing Token
  type: http
  seq: 5

http:
  method: POST
  url: "{{BASE_URL}}/payment/:uuid"
  params:
    - name: uuid
      value: "{{SUB_UUID}}"
      type: path
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
      "amount": 10000
      }
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 400 for missing token", function() {
          expect(res.getStatus()).to.be.oneOf([400, 403, 412]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Validation: payment_token is required.
  Should return 400 when token is missing.
