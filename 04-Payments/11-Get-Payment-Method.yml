info:
  name: 11 Get Payment Method
  type: http
  seq: 11

http:
  method: GET
  url: "{{BASE_URL}}/sub_account/{{SUB_UUID}}/payment_method/{{PAYMENT_METHOD_TOKEN}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have data", function() {
          expect(res.getBody().data).to.be.an('object');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get payment method details by sub-account UUID and token.
  Uses PAYMENT_METHOD_TOKEN saved from create payment test.
