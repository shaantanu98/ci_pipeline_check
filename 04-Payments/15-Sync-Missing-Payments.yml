info:
  name: 15 Sync Missing Payments
  type: http
  seq: 15

http:
  method: POST
  url: "{{BASE_URL}}/sync-missing-payments"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
      "payment_ids": ["{{PAYMENT_ID}}"]
      }
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Sync missing payments by providing payment IDs.
  Queues found payments via SQS for processing.
