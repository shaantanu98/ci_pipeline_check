info:
  name: 13 Void Payment
  type: http
  seq: 13

http:
  method: POST
  url: "{{BASE_URL}}/void_payment/{{SUB_UUID}}/{{PAYMENT_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200 or 400 (if payment already captured)", function() {
          // Void may fail if payment has already settled/captured
          expect(res.getStatus()).to.be.oneOf([200, 400]);
        });
        test("should have response data", function() {
          const body = res.getBody();
          expect(body).to.be.an('object');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Void an existing payment.
  Uses SUB_UUID and PAYMENT_ID from previous tests.
