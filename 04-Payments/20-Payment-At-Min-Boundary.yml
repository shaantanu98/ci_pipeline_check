info:
  name: 20 Payment At Min Boundary
  type: http
  seq: 20

http:
  method: POST
  url: "{{BASE_URL}}/payment/:uuid"
  params:
    - name: uuid
      value: "{{SUB_UUID}}"
      type: path
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "amount": 50,
        "payment_token": "WILL_BE_SET_BY_SCRIPT",
        "meta": {
          "email": "e2e-min@leappay.com",
          "job_id": 20
        }
      }
  auth:
    type: none

runtime:
  scripts:
    - type: before-request
      code: |-
        const axios = require("axios");
        const JUSTIFI_TOKEN = "Bearer " + bru.getEnvVar("JUSTIFI_TOKEN");
        const ACCT = bru.getEnvVar("ACCOUNT_ID");
        if (!JUSTIFI_TOKEN || JUSTIFI_TOKEN === "Bearer ") {
          console.log("ERROR: Run 'Get JustiFi Token' first");
          return;
        }
        try {
          const resp = await axios({
            method: "POST",
            url: "https://api.justifi.ai/v1/payment_methods",
            headers: {
              "Content-Type": "application/json",
              "Authorization": JUSTIFI_TOKEN,
              "Idempotency-Key": "e2e-min-" + Date.now(),
              "Sub-Account": ACCT
            },
            data: {
              payment_method: {
                card: {
                  name: "E2E Min Test",
                  number: "4242424242424242",
                  verification: "123",
                  month: "12",
                  year: "2028",
                  address_postal_code: "55555"
                }
              }
            }
          });
          const token = resp.data?.data?.card?.token;
          console.log("Card tokenized:", token);
          req.setBody({
            amount: 50,
            payment_token: token,
            meta: { email: "e2e-min@leappay.com", job_id: 20 }
          });
        } catch (e) {
          console.log("Tokenization error:", e.response?.data || e.message);
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have payment_id", function() {
          expect(res.getBody().data.payment_id).to.be.a('string');
        });
        test("should have fee_amount", function() {
          expect(res.getBody().data.fee_amount).to.be.a('number');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create a payment at the exact minimum boundary (50 cents = $0.50).
  50 cents is PAYMENT_RANGE.MIN and should be accepted.
  Verifies the payment succeeds with payment_id and fee_amount.
