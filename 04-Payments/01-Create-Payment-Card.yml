info:
  name: 01 Create Payment Card
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/payment/:uuid"
  params:
    - name: uuid
      value: "{{SUB_UUID}}"
      type: path
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
      "amount": 10000,
      "payment_token": "WILL_BE_SET_BY_SCRIPT",
      "meta": {
        "email": "e2e-test@leappay.com",
        "job_id": 1
      }
      }
  auth:
    type: none

runtime:
  scripts:
    - type: before-request
      code: |-
        const axios = require("axios");
        const JUSTIFI_TOKEN = "Bearer " + bru.getEnvVar("JUSTIFI_TOKEN");
        const ACCT = bru.getEnvVar("ACCOUNT_ID");
        if (!JUSTIFI_TOKEN || JUSTIFI_TOKEN === "Bearer ") {
        console.log("ERROR: Run 'Get JustiFi Token' first");
        return;
        }
        try {
        const resp = await axios({
          method: "POST",
          url: "https://api.justifi.ai/v1/payment_methods",
          headers: {
            "Content-Type": "application/json",
            "Authorization": JUSTIFI_TOKEN,
            "Idempotency-Key": "e2e-card-" + Date.now(),
            "Sub-Account": ACCT
          },
          data: {
            payment_method: {
              card: {
                name: "E2E Test",
                number: "4242424242424242",
                verification: "123",
                month: "12",
                year: "2028",
                address_postal_code: "55555"
              }
            }
          }
        });
        const token = resp.data?.data?.card?.token;
        console.log("Card tokenized:", token);
        bru.setEnvVar("PAYMENT_TOKEN", token);
        bru.setEnvVar("PAYMENT_METHOD_TOKEN", token);
        req.setBody({
          amount: 10000,
          payment_token: token,
          meta: { email: "e2e-test@leappay.com", job_id: 1 }
        });
        } catch (e) {
        console.log("Tokenization error:", e.response?.data || e.message);
        }
    - type: after-response
      code: |-
        const body = res.getBody();
        const status = res.getStatus();
        if (status === 200 && body.data) {
          bru.setEnvVar("PAYMENT_ID", body.data.payment_id);
          console.log("Payment created:", body.data.payment_id);
          console.log("Fee amount:", body.data.fee_amount, "cents");
          console.log("Status:", body.data.status);
        } else {
          console.log("Payment error:", JSON.stringify(body));
        }
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have payment_id", function() {
          expect(res.getBody().data.payment_id).to.be.a('string');
        });
        test("should have fee_amount", function() {
          expect(res.getBody().data.fee_amount).to.be.a('number');
        });
        test("should have amount matching request", function() {
          expect(res.getBody().data.amount).to.equal(10000);
        });
        test("should have status", function() {
          expect(res.getBody().data.status).to.be.a('string');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create a card payment on a sub-account.
  Before-request script tokenizes a Visa card via JustiFi.
  Amount: $100.00 (10000 cents)
  Saves PAYMENT_ID and PAYMENT_METHOD_TOKEN for subsequent tests.
