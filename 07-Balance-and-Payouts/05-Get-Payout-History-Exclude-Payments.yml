info:
  name: 05 Get Payout History Exclude Payments
  type: http
  seq: 5

http:
  method: GET
  url: "{{BASE_URL}}/get_payout_history/{{SUB_UUID}}?include_payments=0"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get payout history without payment details.
  include_payments=0 excludes payment data for lighter response.
