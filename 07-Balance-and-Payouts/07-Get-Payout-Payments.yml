info:
  name: 07 Get Payout Payments
  type: http
  seq: 7

http:
  method: GET
  url: "{{BASE_URL}}/get_payout_payments/{{SUB_UUID}}?payout_id={{PAYOUT_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.be.oneOf([200, 400, 500]);
        });
        test("should have data", function() {
          expect(res.getBody()).to.exist;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get payments within a specific payout.
  Requires payout_id query parameter.
