info:
  name: 10 Get Balance Summary Fields
  type: http
  seq: 10

http:
  method: GET
  url: "{{BASE_URL}}/payout_balance_summary/{{SUB_UUID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.getStatus()).to.equal(200);
        });
        test("should have data object", function() {
          const body = res.getBody();
          expect(body.data).to.be.an('object');
        });
        test("should have balance_amount as number", function() {
          const data = res.getBody().data;
          expect(data.balance_amount).to.be.a('number');
        });
        test("should have payout_amount as number", function() {
          const data = res.getBody().data;
          expect(data.payout_amount).to.be.a('number');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Validate balance summary response fields.
  Checks data object contains balance_amount and payout_amount as numbers.
