info:
  name: 08 Get Payout Payments Missing Payout ID
  type: http
  seq: 8

http:
  method: GET
  url: "{{BASE_URL}}/get_payout_payments/{{SUB_UUID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return error for missing payout_id", function() {
          expect(res.getStatus()).to.be.oneOf([400, 412, 500]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Validation: payout_id query param is required.
  Should return error when missing.
