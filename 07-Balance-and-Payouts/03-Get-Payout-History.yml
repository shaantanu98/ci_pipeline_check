info:
  name: 03 Get Payout History
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/get_payout_history/{{SUB_UUID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (res.getStatus() === 200 && body.data) {
        const payouts = body.data.payouts || body.data;
        if (Array.isArray(payouts) && payouts.length > 0) {
          bru.setEnvVar("PAYOUT_ID", payouts[0].id || "");
          console.log("First payout ID saved:", payouts[0].id);
        }
        }
    - type: tests
      code: |-
        test("should return 200 or 500 (server-side payout query)", function() {
          expect(res.getStatus()).to.be.oneOf([200, 500]);
        });
        test("should have data if 200", function() {
          if (res.getStatus() === 200) {
            const b = res.getBody(); expect(b.data || b.payouts).to.exist;
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get payout history for a sub-account.
  Default limit: 20, includes payments by default.
