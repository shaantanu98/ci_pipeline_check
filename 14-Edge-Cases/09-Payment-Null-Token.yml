info:
  name: 09 Payment Null Token
  type: http
  seq: 9

http:
  method: POST
  url: "{{BASE_URL}}/payment/:uuid"
  params:
    - name: uuid
      value: "{{SUB_UUID}}"
      type: path
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "amount": 10000,
        "payment_token": ""
      }
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should reject empty payment token", function() {
          expect(res.getStatus()).to.be.oneOf([400, 412]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Payment with null/empty payment_token.
  Should be rejected - token is required and must be non-empty.
