info:
  name: 17 Payment Wrong Data Service
  type: http
  seq: 17

http:
  method: POST
  url: "{{BASE_URL}}/payment/:uuid"
  params:
    - name: uuid
      value: "{{SUB_UUID}}"
      type: path
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: invalid_service
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "amount": 10000,
        "payment_token": "pm_test_wrong_service"
      }
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should reject invalid data-service", function() {
          expect(res.getStatus()).to.be.oneOf([400, 403, 412, 500]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Payment with invalid data-service header.
  Should return error - unknown origin.
