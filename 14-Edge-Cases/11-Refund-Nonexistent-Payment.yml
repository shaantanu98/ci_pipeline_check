info:
  name: 11 Refund Nonexistent Payment
  type: http
  seq: 11

http:
  method: POST
  url: "{{BASE_URL}}/refund/:uuid"
  params:
    - name: uuid
      value: "{{SUB_UUID}}"
      type: path
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "type": "full",
        "justifi_payment_id": "py_nonexistent_99999_fake"
      }
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should reject refund for nonexistent payment", function() {
          expect(res.getStatus()).to.be.oneOf([400, 404, 412]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Refund with a payment_id that doesn't exist.
  Should return 404 or 412.
