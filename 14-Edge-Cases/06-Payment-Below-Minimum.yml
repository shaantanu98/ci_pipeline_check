info:
  name: 06 Payment Below Minimum 50 Cents
  type: http
  seq: 6

http:
  method: POST
  url: "{{BASE_URL}}/payment/:uuid"
  params:
    - name: uuid
      value: "{{SUB_UUID}}"
      type: path
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "amount": 49,
        "payment_token": "WILL_BE_SET_BY_SCRIPT",
        "meta": { "test": "below_minimum_amount" }
      }
  auth:
    type: none

runtime:
  scripts:
    - type: before-request
      code: |-
        const axios = require("axios");
        const JUSTIFI_TOKEN = "Bearer " + bru.getEnvVar("JUSTIFI_TOKEN");
        const ACCT = bru.getEnvVar("ACCOUNT_ID");
        try {
          const resp = await axios({
            method: "POST",
            url: "https://api.justifi.ai/v1/payment_methods",
            headers: { "Content-Type": "application/json", "Authorization": JUSTIFI_TOKEN, "Idempotency-Key": "min-amount-" + Date.now(), "Sub-Account": ACCT },
            data: { payment_method: { card: { name: "Min Test", number: "4242424242424242", verification: "123", month: "12", year: "2028", address_postal_code: "55555" } } }
          });
          req.setBody({ amount: 49, payment_token: resp.data?.data?.card?.token, meta: { test: "below_minimum_amount" } });
        } catch (e) { console.log("Error:", e.message); }
    - type: after-response
      code: |-
        const body = res.getBody();
        console.log("=== BELOW MINIMUM AMOUNT (49 cents, min is 50) ===");
        console.log("Status:", res.getStatus());
        console.log("Response:", JSON.stringify(res.getBody()));
    - type: tests
      code: |-
        test("should reject amount below minimum of 50 cents", function() {
          // PAYMENT_RANGE.MIN = 50 in global.ts — amounts below 50 cents are rejected
          expect(res.getStatus()).to.equal(412);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Payment below the minimum: 49 cents ($0.49).
  PAYMENT_RANGE.MIN = 50 cents in global.ts.
  Zod validation rejects amounts below 50.
