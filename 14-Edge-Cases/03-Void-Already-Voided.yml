info:
  name: 03 Void Already Voided
  type: http
  seq: 3

http:
  method: POST
  url: "{{BASE_URL}}/void_payment/{{SUB_UUID}}/{{VOID_PAYMENT_ID}}"
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        console.log("=== VOID ALREADY VOIDED ===");
        console.log("Status:", res.getStatus());
        console.log("Response:", JSON.stringify(res.getBody()));
        console.log("Expected: Error (payment already voided)");
    - type: tests
      code: |-
        test("should reject double void", function() {
          expect(res.getStatus()).to.be.oneOf([400, 412, 422, 500]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Attempt to void a payment that was already voided.
  Uses VOID_PAYMENT_ID from lifecycle tests.
  Should return an error.
