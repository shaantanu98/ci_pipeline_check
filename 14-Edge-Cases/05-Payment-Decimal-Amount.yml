info:
  name: 05 Payment Decimal Amount
  type: http
  seq: 5

http:
  method: POST
  url: "{{BASE_URL}}/payment/:uuid"
  params:
    - name: uuid
      value: "{{SUB_UUID}}"
      type: path
  headers:
    - name: Authorization
      value: "{{AUTHTOKEN}}"
    - name: data-service
      value: "{{DATASERVICE}}"
    - name: application-id
      value: "{{APPLICATION_ID}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "amount": 99.99,
        "payment_token": "pm_test_decimal"
      }
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("should reject decimal amount", function() {
          expect(res.getStatus()).to.be.oneOf([400, 412]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Attempt payment with decimal (non-integer) amount.
  Amount must be integer (cents). Decimals should be rejected.
